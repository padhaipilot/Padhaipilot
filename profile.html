<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard | Padhai Pilot</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Arial', sans-serif; background-color: #f3f4f6; margin: 0; display: flex; color: #333; }
    
    /* SIDEBAR */
    .sidebar { width: 250px; background: white; height: 100vh; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); position: fixed; }
    .sidebar h2 { color: #2563eb; font-size: 24px; margin-bottom: 30px; border-bottom: 2px solid #eff6ff; padding-bottom: 10px;}
    .nav-link { display: block; padding: 12px 15px; color: #4b5563; text-decoration: none; border-radius: 8px; margin-bottom: 10px; font-weight: bold; transition: 0.3s; }
    .nav-link:hover, .nav-link.active { background: #eff6ff; color: #2563eb; }
    .nav-link i { margin-right: 10px; width: 20px; }

    /* MAIN CONTENT */
    .main-content { margin-left: 290px; padding: 40px; flex: 1; }
    
    /* PROFILE HEADER CARD */
    .profile-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .user-info { display: flex; align-items: center; gap: 20px; }
    .avatar { width: 80px; height: 80px; background: #2563eb; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; }
    .user-details h1 { margin: 0; font-size: 26px; color: #1f2937; }
    .user-details p { margin: 5px 0 0 0; color: #6b7280; }
    
    .logout-btn { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
    .logout-btn:hover { background: #dc2626; }

    /* STATS GRID */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; }
    .stat-card h3 { margin: 0; font-size: 36px; color: #2563eb; }
    .stat-card p { margin: 10px 0 0 0; color: #6b7280; font-weight: bold; }

    /* RECENT PERFORMANCE */
    .performance-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .performance-section h3 { margin-top: 0; color: #1f2937; }
    .coming-soon-box { background: #f9fafb; border: 2px dashed #d1d5db; border-radius: 10px; padding: 40px; text-align: center; color: #9ca3af; }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2><i class="fa-solid fa-graduation-cap"></i> Padhai Pilot</h2>
    <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
    <a href="#" class="nav-link active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-book-open"></i> My Courses</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-trophy"></i> Mock Tests</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-gear"></i> Settings</a>
  </div>

  <div class="main-content">
    <div class="profile-card">
      <div class="user-info">
        <div class="avatar"><i class="fa-regular fa-user"></i></div>
        <div class="user-details">
          <h1 id="dashName">Loading...</h1>
          <p id="dashEmail">Please wait...</p>
          <p id="dashPhone" style="font-size: 13px; color: #9ca3af;"><i class="fa-solid fa-phone"></i> Loading...</p>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>0</h3>
        <p>Active Courses</p>
      </div>
      <div class="stat-card">
        <h3>0</h3>
        <p>Tests Attempted</p>
      </div>
      <div class="stat-card">
        <h3>--</h3>
        <p>Average Rank</p>
      </div>
    </div>

    <div class="performance-section">
      <h3><i class="fa-solid fa-chart-line"></i> Performance Graph</h3>
      <div class="coming-soon-box">
        <i class="fa-solid fa-chart-bar" style="font-size: 40px; margin-bottom: 10px;"></i>
        <p>Graph aur Rank Analytics jaldi hi aa rahe hain!</p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDHo4a317WqzvSFB31X9RdbBksUNb81fZM",
      authDomain: "padhaipilot-1dcae.firebaseapp.com",
      projectId: "padhaipilot-1dcae",
      storageBucket: "padhaipilot-1dcae.firebasestorage.app",
      messagingSenderId: "752062230479",
      appId: "1:752062230479:web:59680b96008a3aa052acba"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Check if user is logged in
    auth.onAuthStateChanged((user) => {
      if (user) {
        // Fetch User Data from Firestore
        db.collection("users").doc(user.uid).get().then((doc) => {
          if (doc.exists) {
            document.getElementById('dashName').innerText = "Hi, " + doc.data().name;
            document.getElementById('dashEmail').innerText = doc.data().email;
            document.getElementById('dashPhone').innerText = "+91 " + doc.data().phone;
          } else {
            document.getElementById('dashName').innerText = "Student";
            document.getElementById('dashEmail').innerText = user.email;
          }
        });
      } else {
        // Agar login nahi hai, wapas home par bhej do
        window.location.href = "index.html";
      }
    });

    // Logout Functionality
    document.getElementById('logoutBtn').addEventListener('click', () => {
      auth.signOut().then(() => {
        window.location.href = "index.html";
      });
    });
  </script>
</body>
</html>
